<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr13a" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="780" height="220" fill="#ffffff"/>
  <text x="390" y="34" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="700">A Food Chain</text>

  <!-- Nodes -->
  <g text-anchor="middle">
    <rect x="20" y="90" width="120" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="80" y="118" font-size="15" fill="#166534" font-weight="700">Grass</text>
    <text x="80" y="138" font-size="11" fill="#166534">Producer</text>

    <rect x="180" y="90" width="120" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="240" y="114" font-size="14" fill="#854d0e" font-weight="700">Grasshopper</text>
    <text x="240" y="134" font-size="11" fill="#854d0e">Primary consumer</text>

    <rect x="340" y="90" width="120" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="400" y="114" font-size="15" fill="#1e40af" font-weight="700">Frog</text>
    <text x="400" y="134" font-size="11" fill="#1e40af">Secondary consumer</text>

    <rect x="500" y="90" width="120" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="560" y="114" font-size="15" fill="#5b21b6" font-weight="700">Snake</text>
    <text x="560" y="134" font-size="11" fill="#5b21b6">Tertiary consumer</text>

    <rect x="660" y="90" width="110" height="60" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="715" y="114" font-size="15" fill="#991b1b" font-weight="700">Eagle</text>
    <text x="715" y="134" font-size="11" fill="#991b1b">Top carnivore</text>
  </g>

  <!-- Arrows (energy flow direction) -->
  <g stroke="#16a34a" stroke-width="3" fill="none">
    <line x1="142" y1="120" x2="176" y2="120" marker-end="url(#arr13a)"/>
    <line x1="302" y1="120" x2="336" y2="120" marker-end="url(#arr13a)"/>
    <line x1="462" y1="120" x2="496" y2="120" marker-end="url(#arr13a)"/>
    <line x1="622" y1="120" x2="656" y2="120" marker-end="url(#arr13a)"/>
  </g>
  <text x="390" y="200" font-size="13" fill="#64748b" text-anchor="middle">Arrows show the direction of energy flow (only ~10% passes to each next level).</text>
</svg>
