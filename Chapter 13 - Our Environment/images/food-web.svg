<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr13b" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#ffffff"/>
  <text x="360" y="34" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="700">A Food Web (many interconnected food chains)</text>

  <!-- Arrows first (so nodes sit on top) -->
  <g stroke="#475569" stroke-width="2" fill="none">
    <!-- Grass to herbivores -->
    <line x1="150" y1="380" x2="130" y2="300" marker-end="url(#arr13b)"/>
    <line x1="200" y1="378" x2="330" y2="300" marker-end="url(#arr13b)"/>
    <line x1="230" y1="380" x2="520" y2="300" marker-end="url(#arr13b)"/>
    <!-- Grasshopper (insect) to frog & bird -->
    <line x1="130" y1="255" x2="300" y2="180" marker-end="url(#arr13b)"/>
    <line x1="150" y1="255" x2="120" y2="180" marker-end="url(#arr13b)"/>
    <!-- Rabbit to hawk -->
    <line x1="360" y1="258" x2="380" y2="120" marker-end="url(#arr13b)"/>
    <!-- Mouse to snake & hawk -->
    <line x1="540" y1="258" x2="560" y2="180" marker-end="url(#arr13b)"/>
    <line x1="520" y1="258" x2="410" y2="120" marker-end="url(#arr13b)"/>
    <!-- Frog to snake -->
    <line x1="130" y1="150" x2="540" y2="160" marker-end="url(#arr13b)"/>
    <!-- Bird & snake to hawk -->
    <line x1="330" y1="150" x2="380" y2="115" marker-end="url(#arr13b)"/>
    <line x1="580" y1="150" x2="420" y2="112" marker-end="url(#arr13b)"/>
  </g>

  <!-- Producer -->
  <g text-anchor="middle">
    <rect x="120" y="380" width="120" height="46" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="180" y="408" font-size="15" fill="#166534" font-weight="700">Grass</text>

    <!-- Herbivores -->
    <rect x="70" y="258" width="120" height="42" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="130" y="284" font-size="13" fill="#854d0e" font-weight="700">Grasshopper</text>

    <rect x="300" y="258" width="120" height="42" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="360" y="284" font-size="14" fill="#854d0e" font-weight="700">Rabbit</text>

    <rect x="490" y="258" width="120" height="42" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="550" y="284" font-size="14" fill="#854d0e" font-weight="700">Mouse</text>

    <!-- Carnivores mid -->
    <rect x="70" y="130" width="110" height="42" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="125" y="156" font-size="14" fill="#1e40af" font-weight="700">Frog</text>

    <rect x="280" y="130" width="110" height="42" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="335" y="156" font-size="14" fill="#1e40af" font-weight="700">Bird</text>

    <rect x="530" y="130" width="110" height="42" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="585" y="156" font-size="14" fill="#5b21b6" font-weight="700">Snake</text>

    <!-- Top predator -->
    <rect x="345" y="72" width="110" height="42" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="400" y="98" font-size="14" fill="#991b1b" font-weight="700">Hawk</text>
  </g>
  <text x="360" y="448" font-size="13" fill="#64748b" text-anchor="middle">Each animal has more than one food source &#8594; a stable, interconnected web.</text>
</svg>
