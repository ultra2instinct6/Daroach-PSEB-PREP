<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <pattern id="hatch9a" width="12" height="12" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#cbd5e1" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="720" height="420" fill="#ffffff"/>
  <!-- Mirror surface -->
  <rect x="90" y="330" width="540" height="16" fill="url(#hatch9a)"/>
  <line x1="90" y1="330" x2="630" y2="330" stroke="#0f172a" stroke-width="4"/>
  <text x="600" y="372" font-size="16" fill="#475569">Mirror (M)</text>
  <!-- Normal -->
  <line x1="360" y1="330" x2="360" y2="70" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="368" y="66" font-size="16" fill="#64748b">Normal</text>
  <!-- Incident ray -->
  <line x1="150" y1="90" x2="360" y2="330" stroke="#e11d48" stroke-width="3" marker-end="url(#arr)"/>
  <text x="120" y="82" font-size="16" fill="#e11d48">Incident ray</text>
  <!-- Reflected ray -->
  <line x1="360" y1="330" x2="570" y2="90" stroke="#2563eb" stroke-width="3" marker-end="url(#arr)"/>
  <text x="522" y="82" font-size="16" fill="#2563eb">Reflected ray</text>
  <!-- Angle arcs -->
  <path d="M 335 260 A 90 90 0 0 1 360 240" fill="none" stroke="#e11d48" stroke-width="2"/>
  <text x="316" y="250" font-size="18" fill="#e11d48" font-style="italic">i</text>
  <path d="M 360 240 A 90 90 0 0 1 385 260" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="392" y="250" font-size="18" fill="#2563eb" font-style="italic">r</text>
  <!-- Point of incidence -->
  <circle cx="360" cy="330" r="5" fill="#0f172a"/>
  <text x="366" y="352" font-size="15" fill="#0f172a">O</text>
  <!-- Law caption -->
  <text x="360" y="405" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="700">Law of Reflection:  &#8736; i = &#8736; r</text>
</svg>
