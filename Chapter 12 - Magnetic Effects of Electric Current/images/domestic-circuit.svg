<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="420" fill="#ffffff"/>
  <text x="360" y="30" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="700">Domestic Electric Circuit</text>
  <!-- Main supply + meter + fuse -->
  <text x="30" y="95" font-size="14" fill="#334155">Mains</text>
  <rect x="80" y="70" width="60" height="34" fill="none" stroke="#334155" stroke-width="2"/>
  <text x="110" y="92" font-size="12" fill="#334155" text-anchor="middle">Meter</text>
  <!-- Main fuse -->
  <rect x="160" y="70" width="46" height="34" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="183" y="92" font-size="12" fill="#dc2626" text-anchor="middle">Fuse</text>
  <!-- Live wire (red) -->
  <line x1="206" y1="87" x2="680" y2="87" stroke="#dc2626" stroke-width="4"/>
  <text x="600" y="78" font-size="13" fill="#dc2626" font-weight="700">Live (L)</text>
  <!-- Neutral wire (black) -->
  <line x1="80" y1="330" x2="680" y2="330" stroke="#111827" stroke-width="4"/>
  <text x="590" y="352" font-size="13" fill="#111827" font-weight="700">Neutral (N)</text>
  <!-- Earth wire (green) -->
  <line x1="80" y1="370" x2="680" y2="370" stroke="#16a34a" stroke-width="4"/>
  <text x="600" y="392" font-size="13" fill="#16a34a" font-weight="700">Earth (E)</text>
  <line x1="80" y1="370" x2="80" y2="395" stroke="#16a34a" stroke-width="4"/>
  <line x1="66" y1="395" x2="94" y2="395" stroke="#16a34a" stroke-width="4"/>
  <line x1="71" y1="401" x2="89" y2="401" stroke="#16a34a" stroke-width="3"/>
  <line x1="76" y1="407" x2="84" y2="407" stroke="#16a34a" stroke-width="3"/>
  <!-- Appliance 1: Bulb (in parallel) -->
  <line x1="290" y1="87" x2="290" y2="140" stroke="#dc2626" stroke-width="3"/>
  <circle cx="290" cy="165" r="25" fill="#fef9c3" stroke="#0f172a" stroke-width="3"/>
  <line x1="273" y1="148" x2="307" y2="182" stroke="#0f172a" stroke-width="2"/>
  <line x1="307" y1="148" x2="273" y2="182" stroke="#0f172a" stroke-width="2"/>
  <line x1="290" y1="190" x2="290" y2="330" stroke="#111827" stroke-width="3"/>
  <text x="290" y="215" font-size="12" fill="#334155" text-anchor="middle">Bulb</text>
  <!-- Appliance 2: Socket/appliance (three-pin, earthed) -->
  <line x1="470" y1="87" x2="470" y2="150" stroke="#dc2626" stroke-width="3"/>
  <rect x="435" y="150" width="90" height="60" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
  <text x="480" y="185" font-size="12" fill="#0369a1" text-anchor="middle">Appliance</text>
  <line x1="470" y1="210" x2="470" y2="330" stroke="#111827" stroke-width="3"/>
  <line x1="500" y1="210" x2="500" y2="370" stroke="#16a34a" stroke-width="3"/>
  <text x="360" y="415" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="600">Appliances are connected in PARALLEL; metal bodies are earthed for safety.</text>
</svg>
