<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="440" fill="#ffffff"/>
  <text x="360" y="32" font-size="18" fill="#0f172a" text-anchor="middle" font-weight="700">AC Generator (converts Mechanical &#8594; Electrical energy)</text>
  <!-- Magnet poles -->
  <rect x="70" y="120" width="70" height="180" fill="#ef4444"/>
  <text x="105" y="218" font-size="26" fill="#fff" text-anchor="middle" font-weight="700">N</text>
  <rect x="580" y="120" width="70" height="180" fill="#3b82f6"/>
  <text x="615" y="218" font-size="26" fill="#fff" text-anchor="middle" font-weight="700">S</text>
  <!-- Coil ABCD -->
  <rect x="250" y="150" width="220" height="120" fill="none" stroke="#0f172a" stroke-width="5"/>
  <text x="360" y="210" font-size="15" fill="#64748b" text-anchor="middle">Rotating coil</text>
  <text x="244" y="146" font-size="15" fill="#0f172a" font-weight="700">A</text>
  <text x="470" y="146" font-size="15" fill="#0f172a" font-weight="700">B</text>
  <!-- Rotation arrow -->
  <path d="M 300 130 A 60 40 0 0 1 420 130" fill="none" stroke="#16a34a" stroke-width="3"/>
  <path d="M420,130 l -4,-12 l 12,4 z" fill="#16a34a"/>
  <text x="360" y="118" font-size="13" fill="#16a34a" text-anchor="middle">turned by hand/turbine</text>
  <!-- Leads to slip rings -->
  <line x1="300" y1="270" x2="300" y2="330" stroke="#0f172a" stroke-width="4"/>
  <line x1="420" y1="270" x2="420" y2="330" stroke="#0f172a" stroke-width="4"/>
  <!-- Two full slip rings -->
  <ellipse cx="300" cy="352" rx="26" ry="16" fill="none" stroke="#b45309" stroke-width="6"/>
  <ellipse cx="420" cy="352" rx="26" ry="16" fill="none" stroke="#b45309" stroke-width="6"/>
  <text x="360" y="392" font-size="13" fill="#b45309" text-anchor="middle">Two slip rings (R&#8321;, R&#8322;)</text>
  <!-- Brushes -->
  <rect x="262" y="366" width="24" height="14" fill="#334155"/>
  <rect x="434" y="366" width="24" height="14" fill="#334155"/>
  <!-- Galvanometer in external circuit -->
  <line x1="274" y1="380" x2="274" y2="415" stroke="#0f172a" stroke-width="3"/>
  <line x1="274" y1="415" x2="330" y2="415" stroke="#0f172a" stroke-width="3"/>
  <circle cx="360" cy="415" r="22" fill="none" stroke="#0f172a" stroke-width="3"/>
  <text x="360" y="421" font-size="15" fill="#0f172a" text-anchor="middle" font-weight="700">G</text>
  <line x1="382" y1="415" x2="446" y2="415" stroke="#0f172a" stroke-width="3"/>
  <line x1="446" y1="415" x2="446" y2="380" stroke="#0f172a" stroke-width="3"/>
  <text x="410" y="437" font-size="13" fill="#334155" text-anchor="middle">Galvanometer</text>
</svg>
