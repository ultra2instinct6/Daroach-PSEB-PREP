<style>
  :root {

    --text-bold: #ffffff;
    --text-dim: #8e9bb0;

    --aura-phy: #b026ff;
    --aura-env: #ffaa00;

  html { background: var(--bg-void); }

    height: 100vh;
    overflow: hidden;

    color: var(--text-bold);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, var(--font-gurmukhi);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 8%, rgba(0, 0, 0, 0.98) 100%);
  }

  button, input { font: inherit; }
  button { border: 0; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

  @keyframes deltaWave { 0%, 100% { opacity: 0.02; transform: scale(1); } 50% { opacity: 0.05; transform: scale(1.05); } }

  .core-mass { --core-scale: 1; --core-shift-x: 0px; --core-shift-y: 0px; --orb-spin: 0deg; --orb-charge: 0; position: relative; width: clamp(126px, 31vw, 172px); height: clamp(126px, 31vw, 172px); border-radius: 50%; box-shadow: 0 0 100px rgba(0, 165, 255, 0.4), 0 0 200px rgba(0, 130, 255, 0.2); transform: translate3d(var(--core-shift-x), var(--core-shift-y), 0) scale(calc(var(--core-scale) + var(--orb-charge) * 0.06)); filter: saturate(calc(1 + var(--orb-charge) * 0.9)) brightness(calc(1 + var(--orb-charge) * 0.25)); transition: transform 0.14s linear, box-shadow 0.5s var(--fluid-curve), filter 0.25s ease; }

  function renderPhysics() { if (isPlaceholderView || dial.innerHTML === "") { isLooping = false; return; } let needsMoreFrames = false; if (!isDragging) { targetAngle += velocity; velocity *= 0.92; if (Math.abs(velocity) < 0.005) velocity = 0; else needsMoreFrames = true; const closestSnap = Math.round(targetAngle / degreePerNode) * degreePerNode; const snapDiff = closestSnap - targetAngle; if (Math.abs(snapDiff) > 0.005) { targetAngle += snapDiff * 0.15; needsMoreFrames = true; } else if (velocity === 0) targetAngle = closestSnap; } else needsMoreFrames = true; const angleDiff = targetAngle - currentAngle; if (Math.abs(angleDiff) > 0.005) { currentAngle += angleDiff * 0.2; needsMoreFrames = true; } else currentAngle = targetAngle; dial.style.transform = "rotate(" + currentAngle + "deg)"; const tilt = Math.max(-10, Math.min(10, velocity * 1.2)); arena.style.transform = "rotateY(" + (-tilt) + "deg) rotateX(" + (Math.abs(tilt) / 4) + "deg)"; const swayX = Math.sin(currentAngle / 34) * 6 + tilt * 0.32; const swayY = Math.cos(currentAngle / 48) * 3 - Math.abs(tilt) * 0.16; orbSpin += Math.abs(velocity) * 3.2 + 0.4; const orbCharge = Math.min(1, Math.abs(velocity) / 9); coreMass.style.setProperty("--core-shift-x", swayX.toFixed(2) + "px"); coreMass.style.setProperty("--core-shift-y", swayY.toFixed(2) + "px"); coreMass.style.setProperty("--orb-spin", orbSpin.toFixed(1) + "deg"); coreMass.style.setProperty("--orb-charge", orbCharge.toFixed(3)); coreRing.style.transform = "translate3d(" + (swayX * 0.3).toFixed(2) + "px," + (swayY * 0.3).toFixed(2) + "px,0)"; const activeIdx = getActiveIndex(); for (let i = 0; i < syllabus.length; i++) { const nodeAngle = i * degreePerNode; const counterRot = String(-(nodeAngle + currentAngle)) + "deg"; let distRaw = Math.abs(((nodeAngle + currentAngle) % 360 + 360) % 360); if (distRaw > 180) distRaw = 360 - distRaw; const easeDepth = Math.pow(Math.min(Math.max(0, distRaw - 15) / 75, 1), 1.4); const sAnchor = document.getElementById("shard-anchor-" + i); const mAnchor = document.getElementById("mirror-anchor-" + i); if (!sAnchor || !mAnchor) continue; const shard = sAnchor.querySelector(".shard"); const mirror = mAnchor.querySelector(".lecture-mirror"); shard.style.setProperty("--shard-rot", counterRot); mirror.style.setProperty("--node-rot", counterRot); if (!isLocked) { const scale = 1 - easeDepth * 0.4; const opacity = 1 - easeDepth * 0.9; const blur = easeDepth * 12; const zIndex = Math.round((1 - easeDepth) * 100); sAnchor.style.opacity = opacity; sAnchor.style.filter = "blur(" + blur + "px)"; sAnchor.style.zIndex = zIndex; shard.style.setProperty("--shard-scale", scale); mAnchor.style.opacity = opacity; mAnchor.style.filter = "blur(" + blur + "px)"; mAnchor.style.zIndex = zIndex; mirror.style.setProperty("--node-scale", scale); const dist = Math.min(Math.abs(i - activeIdx), syllabus.length - Math.abs(i - activeIdx)); [sAnchor, mAnchor].forEach(node => node.classList.toggle("is-targeted", dist === 0)); } } if (activeIdx !== lastTickIdx && !isLocked) { if (Math.abs(targetAngle - currentAngle) > 1.5 && lastTickIdx !== -1) soundDetent(velocity); lastTickIdx = activeIdx; try { localStorage.setItem("bolo_pseb_idx", String(activeIdx)); } catch (e) {} } if (needsMoreFrames || isDragging || isLocked) requestAnimationFrame(renderPhysics); else isLooping = false; }
  function handleNodeAction(index) { if (isPlaceholderView || !syllabus[index]) return; const active = document.getElementById("shard-anchor-" + index); if (isLocked && active && active.classList.contains("is-active")) resetCore(true); else lockCore(index, false); }
  function lockCore(index, silent) { isLocked = true; targetAngle = -index * degreePerNode; velocity = 0; const chap = syllabus[index]; const color = auras[chap.type] || "#00e5ff"; const pct = pctFor(chap); arena.classList.replace("arena-idle", "arena-locked"); arena.style.transform = "rotateY(0deg) rotateX(0deg)"; document.querySelectorAll(".node-anchor").forEach(a => { a.classList.remove("is-active"); a.style.opacity = ""; a.style.filter = ""; }); document.getElementById("shard-anchor-" + index).classList.add("is-active"); document.getElementById("mirror-anchor-" + index).classList.add("is-active"); coreRing.style.background = "radial-gradient(circle at 50% 50%, " + color + "48 0%, " + color + "22 32%, " + color + "00 68%)"; coreRing.style.opacity = "1"; coreRing.style.animationDuration = "3s"; document.getElementById("auraBleed").style.background = "radial-gradient(circle at center, " + color + "30 0%, var(--bg-void) 80%)"; coreMass.style.borderColor = color; coreMass.style.boxShadow = "0 0 95px " + color + "80, 0 0 160px " + color + "35"; coreVal.textContent = ""; coreLbl.textContent = chap.placeholder ? "ਜਲਦੀ ਆ ਰਿਹਾ ਹੈ" : "ਲੈਕਚਰ ਚੁਣੋ"; coreLbl.style.color = color; setCoreOrb(pct); ariaAnnouncer.textContent = "Chapter " + chap.id + ": " + chap.en; if (!silent) soundLock(); wakePhysicsLoop(); }
  function resetCore(makeSound) { isLocked = false; if (makeSound) soundReset(); arena.classList.replace("arena-locked", "arena-idle"); document.querySelectorAll(".node-anchor.is-active").forEach(a => a.classList.remove("is-active")); coreRing.style.background = "radial-gradient(circle at 50% 50%, rgba(70, 205, 255, 0.30) 0%, rgba(0, 150, 255, 0.16) 30%, rgba(0, 115, 255, 0) 72%)"; coreRing.style.opacity = "0.85"; coreRing.style.animationDuration = "5s"; document.getElementById("auraBleed").style.background = "radial-gradient(circle at center, rgba(0, 140, 255, 0.13) 0%, rgba(0, 110, 255, 0.05) 30%, var(--bg-void) 62%)"; coreMass.style.borderColor = "transparent"; coreMass.style.boxShadow = "0 0 70px rgba(0, 160, 255, 0.4), 0 0 130px rgba(0, 130, 255, 0.2)"; coreLbl.textContent = "ਸਿਲੇਬਸ ਦੀ ਤਿਆਰੀ"; coreLbl.style.color = "var(--text-dim)"; setCoreOrb(0); updateGlobalSync(); wakePhysicsLoop(); }
  function openSearchPalette() { renderSearchResults(""); searchPalette.classList.add("is-open"); setTimeout(() => cmdInput.focus(), 40); }
  function closePalettes() { const wasOpen = sharePalette.classList.contains("is-open") || searchPalette.classList.contains("is-open"); sharePalette.classList.remove("is-open"); searchPalette.classList.remove("is-open"); cmdInput.blur(); if (wasOpen) soundClose(); }
  function renderSearchResults(query) { const q = (query || "").trim().toLowerCase(); cmdResults.innerHTML = ""; const matches = syllabus.filter(ch => !q || ch.en.toLowerCase().includes(q) || ch.pa.includes(q) || String(ch.id) === q || ("chapter " + ch.id).includes(q)); matches.forEach(ch => { const btn = document.createElement("button"); btn.type = "button"; btn.className = "cmd-result"; btn.style.color = auras[ch.type]; btn.innerHTML = '<span class="cmd-result-title"><strong>' + ch.pa + '</strong><span>Chapter ' + ch.id + ' · ' + ch.en + '</span></span><span class="cmd-result-meta">' + (ch.placeholder ? 'Soon' : pctFor(ch) + '%') + '</span>'; btn.addEventListener("click", () => { closePalettes(); const idx = syllabus.findIndex(item => item.id === ch.id); targetAngle = -idx * degreePerNode; lockCore(idx, false); }); cmdResults.appendChild(btn); }); if (!matches.length) { const empty = document.createElement("div"); empty.className = "cmd-result"; empty.textContent = "No matching chapters."; cmdResults.appendChild(empty); } }
  function executeShare(platform) { const appUrl = window.location.href.split("#")[0]; const shareText = "PSEB Class 10 Science lecture deck by BOLO.INSTINCT."; if (platform === "whatsapp") window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(shareText + "\n\n" + appUrl), "_blank"); else if (platform === "telegram") window.open("https://t.me/share/url?url=" + encodeURIComponent(appUrl) + "&text=" + encodeURIComponent(shareText), "_blank"); else if (platform === "email") window.open("mailto:?subject=" + encodeURIComponent("BOLO.INSTINCT PSEB Science") + "&body=" + encodeURIComponent(shareText + "\n\n" + appUrl), "_self"); else if (navigator.share) navigator.share({ title: "BOLO.INSTINCT", text: shareText, url: appUrl }).catch(() => {}); else if (navigator.clipboard) navigator.clipboard.writeText(appUrl).then(() => showToast("ਸਿਲੇਬਸ ਲਿੰਕ ਕਾਪੀ ਹੋ ਗਿਆ ਹੈ! (Link copied)")); else showToast(appUrl); closePalettes(); }
  function handleDragStart(x) { if (isLocked || isPlaceholderView) return; initAudio(); isDragging = true; lastX = x; velocity = 0; wakePhysicsLoop(); }
  function handleDragMove(e) { if (!isDragging || isLocked || isPlaceholderView) return; const currentClientX = e.touches ? e.touches[0].clientX : e.clientX; const delta = currentClientX - lastX; const sensitivity = window.innerWidth < 768 ? 1.4 : 0.8; targetAngle += delta * 0.4 * sensitivity; velocity = delta * 0.7 * sensitivity; lastX = currentClientX; wakePhysicsLoop(); }
  function handleDragEnd() { isDragging = false; wakePhysicsLoop(); }
  document.body.addEventListener("click", e => { initAudio(); const actionBtn = e.target.closest("[data-action]"); if (actionBtn) { if (actionBtn.dataset.action === "open-share") { sharePalette.classList.add("is-open"); soundOpen(); } if (actionBtn.dataset.action === "open-search") { openSearchPalette(); soundOpen(); } return; } const domainSwitch = e.target.closest("[data-domain]"); if (domainSwitch) { setView(domainSwitch.dataset.domain, currentSubject); return; } const subjectSwitch = e.target.closest("[data-subject]"); if (subjectSwitch) { setView(currentDomain, subjectSwitch.dataset.subject); return; } const shareTile = e.target.closest("[data-share]"); if (shareTile) { executeShare(shareTile.dataset.share); return; } if (e.target === sharePalette || e.target === searchPalette) { closePalettes(); return; } const progressTarget = e.target.closest("[data-node-progress]"); if (progressTarget) { const ch = syllabus.find(item => item.id === parseInt(progressTarget.dataset.nodeProgress, 10)); if (ch) toggleComplete(ch, e); return; } const videoTarget = e.target.closest("[data-video-placeholder]"); if (videoTarget) { showToast("ਵੀਡੀਓ ਲੈਕਚਰ ਪਲੇਸਹੋਲਡਰ ਹੈ। (Video lecture placeholder)"); return; } const lectureTarget = e.target.closest("[data-open-lecture]"); if (lectureTarget) { const ch = syllabus[parseInt(lectureTarget.dataset.openLecture, 10)]; if (ch) openLecture(ch, e); return; } const nodeSelect = e.target.closest("[data-node-select]"); if (nodeSelect) { handleNodeAction(parseInt(nodeSelect.dataset.nodeSelect, 10)); return; } if (isLocked && e.target === arena && !isPlaceholderView) resetCore(true); });
  document.getElementById("homeReset").addEventListener("click", () => resetCore(true));
  document.getElementById("streakHud").addEventListener("click", () => showToast("Study streak updates from time spent inside chapter lectures."));
  cmdInput.addEventListener("input", () => renderSearchResults(cmdInput.value));
  cmdInput.addEventListener("keydown", e => { if (e.key === "Enter") { const first = cmdResults.querySelector(".cmd-result"); if (first) first.click(); } });
  arena.addEventListener("mousedown", e => handleDragStart(e.clientX));
  window.addEventListener("mousemove", e => { if (isDragging) { e.preventDefault(); handleDragMove(e); } });
  window.addEventListener("mouseup", handleDragEnd);
  arena.addEventListener("touchstart", e => handleDragStart(e.touches[0].clientX), { passive: false });
  arena.addEventListener("touchmove", e => { if (isDragging) { e.preventDefault(); handleDragMove(e); } }, { passive: false });
  window.addEventListener("touchend", handleDragEnd);
  let lastWheelTs = 0;
  arena.addEventListener("wheel", e => {
    if (isLocked || isPlaceholderView || !syllabus.length) return;
    e.preventDefault();
    const now = Date.now();
    if (now - lastWheelTs < 90) return;
    let d = e.deltaY;
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) d = e.deltaX;
    if (!d) return;
    lastWheelTs = now;
    initAudio();
    targetAngle += (d > 0 ? -1 : 1) * degreePerNode;
    velocity = 0;
    wakePhysicsLoop();
  }, { passive: false });
  window.addEventListener("mousemove", e => { const x = (e.clientX / window.innerWidth - 0.5) * 20; const y = (e.clientY / window.innerHeight - 0.5) * 20; neuralMesh.style.transform = "translate(" + x + "px, " + y + "px)"; });
  document.addEventListener("keydown", e => { if (e.key === "Escape") { closePalettes(); if (isLocked) resetCore(true); } if (e.key === "/" && !searchPalette.classList.contains("is-open")) { e.preventDefault(); openSearchPalette(); } if (e.target === cmdInput) return; if (!isLocked && !isPlaceholderView) { if (e.key === "ArrowRight") { initAudio(); targetAngle -= degreePerNode; velocity = 0; wakePhysicsLoop(); } if (e.key === "ArrowLeft") { initAudio(); targetAngle += degreePerNode; velocity = 0; wakePhysicsLoop(); } if (e.key === "Enter") handleNodeAction(getActiveIndex()); } });
  window.addEventListener("resize", wakePhysicsLoop);
  initDial();
  updateResume();
  updateStudyHud();
</script>
