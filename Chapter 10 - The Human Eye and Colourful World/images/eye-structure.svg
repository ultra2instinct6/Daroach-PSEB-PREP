<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="720" height="460" fill="#ffffff"/>
  <!-- Eyeball -->
  <ellipse cx="360" cy="230" rx="230" ry="170" fill="#eef2ff" stroke="#1e3a8a" stroke-width="3"/>
  <!-- Sclera label -->
  <text x="360" y="52" font-size="15" fill="#1e3a8a" text-anchor="middle">Sclera (white outer coat)</text>
  <!-- Front bulge / cornea (left side) -->
  <path d="M 130 165 A 120 120 0 0 0 130 295" fill="#dbeafe" stroke="#0ea5e9" stroke-width="4"/>
  <!-- Aqueous region + iris/pupil -->
  <!-- Iris (colored ring) -->
  <path d="M 178 178 A 70 70 0 0 0 178 282" fill="none" stroke="#7c3aed" stroke-width="14"/>
  <!-- Pupil (opening) -->
  <line x1="171" y1="205" x2="171" y2="255" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <!-- Lens -->
  <ellipse cx="212" cy="230" rx="22" ry="58" fill="#bae6fd" stroke="#0369a1" stroke-width="3"/>
  <!-- Ciliary muscle marks -->
  <circle cx="212" cy="168" r="7" fill="#f59e0b"/>
  <circle cx="212" cy="292" r="7" fill="#f59e0b"/>
  <!-- Retina (inner back lining) -->
  <path d="M 560 150 A 210 160 0 0 1 560 310" fill="none" stroke="#dc2626" stroke-width="6"/>
  <!-- Optic nerve -->
  <path d="M 585 240 q 60 0 95 25" fill="none" stroke="#ca8a04" stroke-width="14" stroke-linecap="round"/>
  <!-- Light axis -->
  <line x1="150" y1="230" x2="560" y2="230" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- Leader lines + labels -->
  <!-- Cornea -->
  <line x1="120" y1="150" x2="150" y2="185" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="40" y="146" font-size="15" fill="#0ea5e9" font-weight="700">Cornea</text>
  <!-- Iris -->
  <line x1="150" y1="330" x2="176" y2="270" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="352" font-size="15" fill="#7c3aed" font-weight="700">Iris</text>
  <!-- Pupil -->
  <line x1="210" y1="360" x2="172" y2="255" stroke="#111827" stroke-width="1.5"/>
  <text x="188" y="380" font-size="15" fill="#111827" font-weight="700">Pupil</text>
  <!-- Lens -->
  <line x1="270" y1="372" x2="216" y2="285" stroke="#0369a1" stroke-width="1.5"/>
  <text x="250" y="392" font-size="15" fill="#0369a1" font-weight="700">Lens</text>
  <!-- Ciliary muscles -->
  <line x1="212" y1="132" x2="212" y2="160" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="126" font-size="15" fill="#b45309" font-weight="700">Ciliary muscles</text>
  <!-- Retina -->
  <line x1="620" y1="150" x2="560" y2="185" stroke="#dc2626" stroke-width="1.5"/>
  <text x="590" y="140" font-size="15" fill="#dc2626" font-weight="700">Retina</text>
  <!-- Optic nerve -->
  <line x1="650" y1="300" x2="655" y2="268" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="588" y="330" font-size="15" fill="#a16207" font-weight="700">Optic nerve</text>

  <text x="360" y="440" font-size="17" fill="#0f172a" text-anchor="middle" font-weight="700">Structure of the Human Eye</text>
</svg>
